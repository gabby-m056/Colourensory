    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <header>
        <nav>
            <p id="nav-title">Colourensory</p>
            <ul class="nav-buttons">
                <li><a href="../Home/index.html">Home</a>

                </li>

            </ul>
        </nav>
    </header>
    <body>
        <main id="marble-experiment" class="experiments">
            <div class="row g-1 container">
                <div class="col-md-7">
                    <section id = "canvas-container">
                        <h2 id="marble-canvas-heading">Digital Marbling</h2>
                        <canvas id="marble-canvas"></canvas>
                    </section>
                </div>
                <div class="col-md-1"></div>
                <div class="col-md-4">
                    <aside id="custom-brush-container">

                        <div id="custom-brush-card" class="card-body card-white-text-colour fieldset-card">

                            <fieldset id="custom-brush-fields">
                                <div id="canvas-button-container" class="container">
                                    <input name="new-canvas" id="new-canvas-button" class="btn btn-secondary normal-buttons-white-bg" type="button" value="New Experiment">
                                    <input name="save-canvas" id="save-canvas-button" class="btn btn-primary cta-buttons" type="button" value="Save Experiment">
                                </div>
                                
                                <br>
                                <label for="brush-slider" >Size:</label><br>
                                <input name="slider" id="brush-slider" class="form-range" type="range" min="10" max="100" value="50"><br>
                                <label for="brush-colour">Drop Colour:</label>
                                
                                <div id="brush-colour" type="color"></div> <br>
                                <label for="colour-hex-value">Hex Value:</label>
                                <input name="colour" id="colour-hex-value" class="form-control form-control-lg " type="text" value="#000000"><br>
                                
                                <label for="download-canvas-filename">Download Image of Experiment:</label><br>
                                <div class="input-group mb-3">
                                <input type="text" class="form-control">
                                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">File Type</button>
                                <ul class="dropdown-menu dropdown-menu-end" aria-label="Dropdown for the image filetype to download">
                                    <li><a class="dropdown-item" href="#">.jpg</a></li>
                                
                                    <li><a class="dropdown-item" href="#">.png</a></li>
                                    
                                </ul>
                                
                                </div>
                                <input name="download-canvas" id="download-canvas-button" class="btn btn-primary normal-buttons-white-bg" type="button" value="Download">
                                <!--input name="download-canvas" id="download-canvas-filename" type="text" value="">
                                
                                <select name="download-canvas-filetype" id="download-canvas-filetype">
                                    <option value="jpg" >.jpg</option>
                                    <option value="png" >.png</option>
                                    
                                </select-->
                                
                            </fieldset>
                        </div>
                        
                    </aside> 
                </div>
            </div>
            
        </main>
        <script src="../dataManagement.js"></script>
        <script src="../main.js"></script>
        <script src="marbleSketch.js"></script>
    </body>
</html>
